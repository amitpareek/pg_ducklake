name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

# Cancel in-progress runs on the same branch (except main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') }}

# Route C/C++ (COMPILER_LAUNCHER) and Rust (RUSTC_WRAPPER) builds through sccache.
env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  COMPILER_LAUNCHER: "sccache"

jobs:
  format:
    name: "clang-format"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Check formatting (kernel + pg_ducklake, excludes vendor/)
        run: |
          find libpgduckdb pg_ducklake/src pg_ducklake/include \
            examples/pg_vortex/src examples/pg_vortex/include \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) -not -path '*/vendor/*' -print0 \
            | xargs -0 uvx clang-format@22.1.5 --dry-run -Werror

  # pg_vortex/pg_duckdb only run when their own or shared sources change.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      pg_vortex: ${{ steps.filter.outputs.pg_vortex }}
      pg_duckdb: ${{ steps.filter.outputs.pg_duckdb }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'libpgduckdb/**'
              - 'duckdb'
              - 'Makefile'
              - 'Makefile.pgxs'
              - '.github/workflows/build_and_test.yaml'
            pg_vortex:
              - *shared
              - 'examples/pg_vortex/**'
            pg_duckdb:
              - *shared
              - 'pg_duckdb/**'

  # One parallel job per extension. Shared setup is defined as YAML anchors on
  # pg_vortex and aliased by the others.
  pg_vortex:
    name: "pg_vortex (PG ${{ matrix.version }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: changes
    if: ${{ needs.changes.outputs.pg_vortex == 'true' }}
    strategy: &ext-matrix
      fail-fast: false
      matrix:
        version: [REL_17_STABLE, REL_18_STABLE, REL_19_STABLE]

    steps:
      - &checkout
        name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - &sccache
        name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - &install_deps
        name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev \
            libssl-dev libxml2-utils xsltproc pkg-config libc++-dev libc++abi-dev libglib2.0-dev \
            libtinfo6 cmake libstdc++-12-dev ninja-build libcurl4-openssl-dev liblz4-dev

      - &clone_pg
        name: Checkout PostgreSQL ${{ matrix.version }}
        run: |
          git clone --branch ${{ matrix.version }} --single-branch --depth 1 \
            https://github.com/postgres/postgres.git postgres

      - &versions
        name: Compute version SHAs
        id: versions
        run: |
          echo "duckdb_sha=$(git -C duckdb rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "postgres_sha=$(git -C postgres rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - &cache_pg
        name: Cache PostgreSQL build
        id: cache-pg
        uses: actions/cache@v4
        with:
          path: postgres/inst
          key: pg-build-ubuntu-24.04-${{ matrix.version }}-${{ steps.versions.outputs.postgres_sha }}

      - &build_pg
        name: Build PostgreSQL
        working-directory: postgres
        run: |
          if [ "${{ steps.cache-pg.outputs.cache-hit }}" != 'true' ]; then
            ./configure --prefix=$PWD/inst --enable-cassert --enable-debug \
              --with-openssl --with-icu --with-libxml --with-lz4
            make -j$(nproc) install
          fi
          echo "$PWD/inst/bin" >> "$GITHUB_PATH"

      - name: Cache DuckDB build
        uses: actions/cache@v4
        with:
          path: duckdb/build/
          key: duckdb-build-ubuntu-24.04-${{ steps.versions.outputs.duckdb_sha }}-${{ hashFiles('examples/pg_vortex/pg_vortex_extensions.cmake') }}

      - name: Build pg_vortex
        run: ERROR_ON_WARNING=1 make examples/pg_vortex/all -j$(nproc)
      - name: Install pg_vortex
        run: make examples/pg_vortex/install

      - name: pg_vortex installcheck
        id: pgvortex_installcheck
        run: make examples/pg_vortex/installcheck
      - name: Print pg_vortex regression.diffs on failure
        if: failure() && steps.pgvortex_installcheck.outcome == 'failure'
        run: cat examples/pg_vortex/regression.diffs || true
      - name: Print pg_vortex postmaster.log on failure
        if: failure() && steps.pgvortex_installcheck.outcome == 'failure'
        run: cat examples/pg_vortex/log/postmaster.log || true

  pg_duckdb:
    name: "pg_duckdb (PG ${{ matrix.version }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: changes
    if: ${{ needs.changes.outputs.pg_duckdb == 'true' }}
    strategy: *ext-matrix

    steps:
      - *checkout
      - *sccache
      - *install_deps
      - *clone_pg
      - *versions
      - *cache_pg
      - *build_pg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install pg_duckdb test deps
        run: uv pip install --system -r pg_duckdb/requirements.txt

      - name: Cache DuckDB build
        uses: actions/cache@v4
        with:
          path: duckdb/build/
          key: duckdb-build-ubuntu-24.04-${{ steps.versions.outputs.duckdb_sha }}-${{ hashFiles('pg_duckdb/third_party/pg_duckdb_extensions.cmake') }}

      - name: Build pg_duckdb
        run: ERROR_ON_WARNING=1 make pg_duckdb/all -j$(nproc)
      - name: Install pg_duckdb
        run: make pg_duckdb/install

      - name: pg_duckdb installcheck
        id: pgduckdb_installcheck
        timeout-minutes: 30
        run: make pg_duckdb/installcheck
      - name: Print regression.diffs on failure
        if: failure() && steps.pgduckdb_installcheck.outcome == 'failure'
        run: cat pg_duckdb/test/regression/regression.diffs || true
      - name: Print postmaster.log on failure
        if: failure() && steps.pgduckdb_installcheck.outcome == 'failure'
        run: cat pg_duckdb/test/regression/log/postmaster.log || true
      - name: Upload pg_duckdb regression artifacts on failure
        if: failure() && steps.pgduckdb_installcheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pg_duckdb-regression-${{ matrix.version }}
          path: |
            pg_duckdb/test/regression/regression.diffs
            pg_duckdb/test/regression/regression.out
            pg_duckdb/test/regression/results/
            pg_duckdb/test/regression/log/

  pg_ducklake:
    name: "pg_ducklake (PG ${{ matrix.version }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
    strategy: *ext-matrix

    steps:
      - *checkout
      - *sccache
      - *install_deps
      - *clone_pg
      - *versions
      - *cache_pg
      - *build_pg

      # CRoaring (DuckLake >= v1.5 deletion vectors) is built via vcpkg manifest mode.
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Cache DuckDB build
        uses: actions/cache@v4
        with:
          # same key as coexist-pg_duckdb, so they share the bundle
          path: duckdb/build/
          key: duckdb-build-ubuntu-24.04-${{ steps.versions.outputs.duckdb_sha }}-${{ hashFiles('pg_ducklake/pg_ducklake_extensions.cmake') }}

      - name: Build pg_ducklake
        run: make pg_ducklake/all -j$(nproc)
      - name: Install pg_ducklake
        run: make pg_ducklake/install

      - name: pg_ducklake installcheck
        id: pgducklake_installcheck
        timeout-minutes: 30
        run: make pg_ducklake/installcheck
      - name: Print pg_ducklake regression.diffs on failure
        if: failure() && steps.pgducklake_installcheck.outcome == 'failure'
        run: cat pg_ducklake/test/regression/regression.diffs || true
      - name: Print pg_ducklake postmaster.log on failure
        if: failure() && steps.pgducklake_installcheck.outcome == 'failure'
        run: cat pg_ducklake/test/regression/log/postmaster.log || true
      - name: Print pg_ducklake isolation diffs and log on failure
        if: failure() && steps.pgducklake_installcheck.outcome == 'failure'
        run: |
          cat pg_ducklake/test/isolation/output_iso/regression.diffs || true
          cat pg_ducklake/test/isolation/output_iso/log/postmaster.log || true
      - name: Upload pg_ducklake regression artifacts on failure
        if: failure() && steps.pgducklake_installcheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pg_ducklake-regression-${{ matrix.version }}
          path: |
            pg_ducklake/test/regression/regression.diffs
            pg_ducklake/test/regression/regression.out
            pg_ducklake/test/regression/results/
            pg_ducklake/test/regression/log/
            pg_ducklake/test/isolation/output_iso/

      # e2e (uv + pytest + asyncpg + dockerized MinIO) runs against the
      # just-installed extension, so it shares this job.
      - name: Install uv (pg_ducklake e2e suite)
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pg_ducklake/test/e2e/uv.lock
      - name: pg_ducklake e2e
        id: pgducklake_e2e
        timeout-minutes: 20
        env:
          # CI runners have docker and network access, so the S3 tests must
          # actually run -- fail instead of skipping when MinIO/httpfs are
          # unavailable.
          E2E_REQUIRE_S3: "1"
        run: make pg_ducklake/check-e2e
      - name: Print pg_ducklake e2e PG log on failure
        if: failure() && steps.pgducklake_e2e.outcome == 'failure'
        run: cat /tmp/pytest-of-*/pytest-current/pgdata*/pg.log || true

  # Coexistence: build + install COMMUNITY pg_duckdb (its own bundled DuckDB),
  # install pg_ducklake alongside, and run the pg_ducklake regression + isolation
  # suites with BOTH extensions preloaded and created (WITH_PG_DUCKDB=1). Proves
  # pg_ducklake coexists with the real upstream pg_duckdb in one backend.
  coexist-pg_duckdb:
    name: "Coexist with community pg_duckdb (${{ matrix.version }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version: [REL_17_STABLE, REL_18_STABLE]

    env:
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
      PG_VERSION: ${{ matrix.version }}
      # Community pg_duckdb release to test coexistence against (pinned for
      # reproducibility; bump deliberately).
      PG_DUCKDB_REF: v1.1.0

    steps:
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev \
            libssl-dev libxml2-utils xsltproc pkg-config libc++-dev libc++abi-dev libglib2.0-dev \
            libtinfo6 cmake libstdc++-12-dev ninja-build libcurl4-openssl-dev liblz4-dev

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Checkout PostgreSQL ${{ env.PG_VERSION }}
        run: |
          git clone --branch ${{ env.PG_VERSION }} --single-branch --depth 1 \
            https://github.com/postgres/postgres.git postgres

      - name: Compute version SHAs
        id: versions
        run: |
          echo "duckdb_sha=$(git -C duckdb rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "postgres_sha=$(git -C postgres rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache PostgreSQL build
        id: cache-pg
        uses: actions/cache@v4
        with:
          path: postgres/inst
          # Same key as build-and-test so the PG build is shared.
          key: pg-build-ubuntu-24.04-${{ env.PG_VERSION }}-${{ steps.versions.outputs.postgres_sha }}

      - name: Build PostgreSQL
        if: steps.cache-pg.outputs.cache-hit != 'true'
        working-directory: postgres
        run: |
          ./configure --prefix=$PWD/inst --enable-cassert --enable-debug \
            --with-openssl --with-icu --with-libxml --with-lz4
          make -j$(nproc) install

      - name: Add PG to PATH
        run: echo "${PWD}/postgres/inst/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- community pg_duckdb (independent extension, bundles its own duckdb) ----
      - name: Checkout community pg_duckdb (${{ env.PG_DUCKDB_REF }})
        run: |
          git clone --recurse-submodules --shallow-submodules \
            --branch "$PG_DUCKDB_REF" --depth 1 \
            https://github.com/duckdb/pg_duckdb.git pg_duckdb_community

      - name: Build and install community pg_duckdb
        run: make -C pg_duckdb_community install -j$(nproc)

      # ---- pg_ducklake ----
      - name: Cache DuckDB build
        uses: actions/cache@v4
        with:
          path: duckdb/build/
          key: duckdb-build-ubuntu-24.04-${{ steps.versions.outputs.duckdb_sha }}-${{ hashFiles('pg_ducklake/pg_ducklake_extensions.cmake') }}

      - name: Build pg_ducklake
        run: make pg_ducklake/all -j$(nproc)
      - name: Install pg_ducklake
        run: make pg_ducklake/install

      # ---- coexistence: both preloaded + created, run pg_ducklake's suites ----
      - name: pg_ducklake regression (with pg_duckdb)
        id: coexist_regression
        timeout-minutes: 30
        run: make pg_ducklake/check-regression WITH_PG_DUCKDB=1

      - name: pg_ducklake isolation (with pg_duckdb)
        id: coexist_isolation
        timeout-minutes: 30
        run: make pg_ducklake/check-isolation WITH_PG_DUCKDB=1

      - name: Print diffs on failure
        if: failure()
        run: |
          cat pg_ducklake/test/regression/regression.diffs || true
          cat pg_ducklake/test/regression/log/postmaster.log || true
          cat pg_ducklake/test/isolation/output_iso/regression.diffs || true

      - name: Upload coexistence artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coexist-pg_duckdb-${{ env.PG_VERSION }}
          path: |
            pg_ducklake/test/regression/regression.diffs
            pg_ducklake/test/regression/results/
            pg_ducklake/test/regression/log/
            pg_ducklake/test/isolation/output_iso/
