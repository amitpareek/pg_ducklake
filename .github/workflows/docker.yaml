name: pg_ducklake Docker

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  packages: write  # push/pull CI images to ghcr.io

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "pg_ducklake/docker/**"
      - ".github/workflows/docker.yaml"
  schedule:
    - cron: "44 4 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag/branch/SHA to build and publish (e.g. v1.0.0) to backfill a release. Empty = the dispatched ref."
        required: false
        default: ""

jobs:
  # Compute build matrix: main-branch push builds only pg-18 for speed;
  # cron, tags, PRs, and workflow_dispatch build all versions and arches.
  setup:
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.m.outputs.build_matrix }}
      merge_matrix: ${{ steps.m.outputs.merge_matrix }}
    steps:
      - id: m
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'build_matrix={"postgres":["18"],"runner":["ubuntu-24.04","ubuntu-24.04-arm"]}' >> "$GITHUB_OUTPUT"
            echo 'merge_matrix={"postgres":["18"]}' >> "$GITHUB_OUTPUT"
          else
            echo 'build_matrix={"postgres":["14","15","16","17","18"],"runner":["ubuntu-24.04","ubuntu-24.04-arm"]}' >> "$GITHUB_OUTPUT"
            echo 'merge_matrix={"postgres":["14","15","16","17","18"]}' >> "$GITHUB_OUTPUT"
          fi

  docker_build:
    name: Build Docker image for Postgres ${{ matrix.postgres }} on ${{ matrix.runner }}
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}

    runs-on: ${{ matrix.runner }}

    env:
      BUILDKIT_PROGRESS: plain
      POSTGRES_VERSION: ${{ matrix.postgres }}
    outputs:
      branch_tag: ${{ steps.params.outputs.branch_tag }}
      target_repo: ${{ steps.params.outputs.target_repo }}
    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: true  # duckdb (repo root) + pg_ducklake/third_party/ducklake

      - name: Compute job parameters
        id: params
        run: |
          # Tag is XX-YYYYY-<branch>-latest so 16 + branch name length
          # since maximum docker tag is 128 characters, we need to truncate the branch name to 112
          # workflow_dispatch can pass an explicit ref (e.g. v1.0.0) to backfill a release.
          BRANCH=$(echo "${{ inputs.ref || github.head_ref || github.ref_name }}" \
              | sed 's/[^a-zA-Z0-9\-\.]/-/g' \
              | cut -c 1-112 | tr '[:upper:]' '[:lower:]' \
              | sed -e 's/-*$//')

          # Set platform depending on which runner we're using
          if [ "${{ matrix.runner }}" = "ubuntu-24.04" ]; then
            PLATFORM=amd64
          else
            PLATFORM=arm64
          fi

          # If main or tag, then push to `pgducklake/pgducklake`
          git fetch --tags --force --no-recurse-submodules
          if [ "$BRANCH" = "main" ] || git rev-parse --verify $BRANCH^{tag} > /dev/null 2>&1; then
            TARGET_REPO='pgducklake/pgducklake'
          else
            TARGET_REPO='ghcr.io/${{ github.repository }}/ci-builds'
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_repo=$TARGET_REPO" >> "$GITHUB_OUTPUT"
          echo "latest_image=ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${PLATFORM}-${BRANCH}-latest" >> "$GITHUB_OUTPUT"

      - name: Attempt to pull previous image
        run: |
          docker pull ${{ steps.params.outputs.latest_image }} || true
          docker pull moby/buildkit:buildx-stable-1

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ steps.params.outputs.platform }}

      - name: docker bake (full)
        uses: docker/bake-action@v5
        with:
          files: pg_ducklake/docker/docker-bake.hcl
          targets: pg_ducklake_${{ matrix.postgres }}
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          set: |
            *.platform=linux/${{ steps.params.outputs.platform }}
            *.cache-from=type=registry,ref=${{ steps.params.outputs.latest_image }}
            *.cache-from=type=gha,scope=${{ github.workflow }}
            *.cache-to=type=gha,mode=max,scope=${{ github.workflow }}
            postgres.tags=ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${{ steps.params.outputs.platform }}-${{ github.sha }}
            postgres.tags=${{ steps.params.outputs.latest_image }}

      - name: docker bake (slim)
        uses: docker/bake-action@v5
        with:
          files: pg_ducklake/docker/docker-bake.hcl
          targets: pg_ducklake_${{ matrix.postgres }}_slim
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          set: |
            *.platform=linux/${{ steps.params.outputs.platform }}
            *.cache-from=type=registry,ref=${{ steps.params.outputs.latest_image }}
            *.cache-from=type=gha,scope=${{ github.workflow }}
            postgres.tags=ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-slim-${{ steps.params.outputs.platform }}-${{ github.sha }}
            postgres.tags=${{ steps.params.outputs.latest_image }}-slim

  clickbench_test:
    name: ClickBench for Postgres ${{ matrix.postgres }} on ${{ matrix.runner }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, docker_build]
    # Non-gating: this drives ClickHouse's external benchmark.sh, whose apt
    # setup conflicts with the runner's held packages (pkgProblemResolver
    # breaks). It is a performance benchmark, not a correctness gate.
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute job parameters
        id: params
        run: |
          if [ "${{ matrix.runner }}" = "ubuntu-24.04" ]; then
            PLATFORM=amd64
          else
            PLATFORM=arm64
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Checkout pg_ducklake
        uses: actions/checkout@v4
        with:
          path: self

      - name: Checkout ClickBench repository
        uses: actions/checkout@v4
        with:
          repository: ClickHouse/ClickBench
          path: clickbench

      - name: Apply pg_ducklake patches to ClickBench
        run: git -C clickbench apply "$GITHUB_WORKSPACE/self/.github/clickbench/pg_ducklake.patch"

      - name: Pull test image
        run: |
          docker pull ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${{ steps.params.outputs.platform }}-${{ github.sha }}

      - name: Run ClickBench
        working-directory: clickbench/pg_ducklake
        env:
          # upstream install reads the image from $PGDUCK_IMAGE
          PGDUCK_IMAGE: ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${{ steps.params.outputs.platform }}-${{ github.sha }}
          # skip the 10-connection QPS window: each pg_ducklake backend runs
          # its own DuckDB instance, and 10 of them starve a 16 GB runner
          # until GitHub kills it ("runner lost communication")
          BENCH_CONCURRENT_DURATION: "0"
        run: |
          # docker.io conflicts with the runner's docker; the image is already
          # pulled above, so drop the apt docker.io and install's own pull.
          sed -i 's/docker\.io //' install
          sed -i '/docker pull/d' install
          ./benchmark.sh 2>&1 | tee benchmark.log
          # an errored query is recorded as a null timing, not a failure exit
          if ! grep -qE '^\[' benchmark.log; then
            echo "ClickBench produced no query results"; exit 1
          fi
          if grep -E '^\[' benchmark.log | grep -q null; then
            echo "ClickBench produced null timings (a query failed)"; exit 1
          fi

  data_inlining_bench:
    name: Data Inlining Benchmark
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, docker_build]
    runs-on: ubuntu-24.04
    continue-on-error: true

    env:
      BENCH_TOTAL_ROWS: "30000"
      BENCH_BATCH_SIZE: "10"

    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download HITS partition
        run: |
          wget --no-verbose --continue \
            'https://datasets.clickhouse.com/hits_compatible/athena_partitioned/hits_0.parquet' \
            -O /tmp/hits_0.parquet

      - name: Pull pg_ducklake image
        run: |
          docker pull ghcr.io/${{ github.repository }}/ci-builds:18-amd64-${{ github.sha }}

      - name: Start containers
        run: |
          docker run -d --name bench-pgducklake \
            -p 5432:5432 \
            -e POSTGRES_PASSWORD=duckdb \
            -v /tmp/hits_0.parquet:/tmp/hits.parquet:ro \
            ghcr.io/${{ github.repository }}/ci-builds:18-amd64-${{ github.sha }}
          docker run -d --name bench-pgcatalog \
            -p 5433:5432 \
            -e POSTGRES_PASSWORD=duckdb \
            postgres:18
          for c in bench-pgducklake bench-pgcatalog; do
            for i in $(seq 60); do
              docker exec "$c" pg_isready -U postgres && break || sleep 1
            done
            docker exec "$c" pg_isready -U postgres
          done

      - name: Run pg_heap baseline
        env:
          BENCH_MODE: heap
        run: |
          uv run pg_ducklake/test/benchmark/data-inlining/bench_pg_ducklake.py \
            > results_pg_heap.json

      - name: Run pg_ducklake benchmark
        run: |
          uv run pg_ducklake/test/benchmark/data-inlining/bench_pg_ducklake.py \
            > results_pg_ducklake.json

      - name: Run DuckDB + DuckLake benchmark
        env:
          BENCH_PG_CATALOG_CONNSTR: "dbname=postgres host=localhost port=5433 user=postgres password=duckdb"
        run: |
          uv run pg_ducklake/test/benchmark/data-inlining/bench_duckdb_ducklake.py \
            > results_duckdb_ducklake.json

      - name: Compare results
        if: always()
        run: |
          echo "=== Data Inlining Benchmark Results ==="
          for f in results_pg_heap.json results_pg_ducklake.json results_duckdb_ducklake.json; do
            if [ -f "$f" ]; then
              scenario=$(jq -r '.scenario' "$f")
              insert=$(jq -r '.results.insert_rows_per_sec // .results.heap_insert_rows_per_sec' "$f")
              echo ""
              echo "--- $scenario ---"
              echo "  Insert: ${insert} rows/s ($(jq -r '.results.insert_sec // .results.heap_insert_sec' "$f")s)"
              # ducklake scenarios have before/after flush; heap has just queries_sec
              if jq -e '.results.flush_sec' "$f" >/dev/null 2>&1; then
                echo "  Queries before flush: $(jq -r '.results.queries_before_flush_sec' "$f")s"
                echo "  Flush:   $(jq -r '.results.flush_sec' "$f")s"
                echo "  Queries after flush:  $(jq -r '.results.queries_after_flush_sec' "$f")s"
              else
                echo "  Queries: $(jq -r '.results.queries_sec' "$f")s"
              fi
            fi
          done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-inlining-bench-results
          path: results_*.json

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f bench-pgducklake bench-pgcatalog 2>/dev/null || true

  readme_test:
    name: README test for Postgres ${{ matrix.postgres }} on ${{ matrix.runner }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, docker_build]
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute job parameters
        id: params
        run: |
          if [ "${{ matrix.runner }}" = "ubuntu-24.04" ]; then
            PLATFORM=amd64
          else
            PLATFORM=arm64
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Pull test image
        run: |
          docker pull ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${{ steps.params.outputs.platform }}-${{ github.sha }}

      - name: Run README scenarios
        run: |
          dump_logs() { echo "=== container logs ==="; docker logs pgducklake 2>&1 || true; }
          trap dump_logs EXIT

          docker run -d --name pgducklake \
            -e POSTGRES_PASSWORD=duckdb \
            ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-${{ steps.params.outputs.platform }}-${{ github.sha }}
          # Wait for postgres to be ready, at most 60 seconds
          sleep 10
          for i in $(seq 50); do
            docker exec pgducklake pg_isready -U postgres && break || sleep 1
          done
          # Fail early with logs if the server never became ready
          docker exec pgducklake pg_isready -U postgres

          run_sql() { echo "$1" | docker exec -i pgducklake psql -U postgres -v ON_ERROR_STOP=1; }

          # Scenario 1: basic DuckLake table (README "Your first Data Lake")
          run_sql "
            CREATE TABLE my_table (id INT, name TEXT, age INT) USING ducklake;
            INSERT INTO my_table VALUES (1, 'Alice', 25), (2, 'Bob', 30);
            SELECT * FROM my_table;
          "

          # Scenario 2: heap → DuckLake ETL (README "Convert a PostgreSQL heap table")
          run_sql "
            CREATE TABLE row_store_table AS
              SELECT i AS id, 'hello pg_ducklake' AS msg FROM generate_series(1, 10000) AS i;
            CREATE TABLE col_store_table USING ducklake AS SELECT * FROM row_store_table;
            SELECT max(id) FROM col_store_table;
          "

          # Scenario 3: external dataset (README "Load an external dataset")
          run_sql "
            CREATE TABLE titanic USING ducklake AS
              SELECT * FROM ducklake.read_csv('https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv');
            SELECT \"Pclass\", \"Sex\", COUNT(*), AVG(\"Survived\") AS survival_rate
            FROM titanic GROUP BY \"Pclass\", \"Sex\";
          "

  docker_merge:
    name: Merge Docker image for Postgres ${{ matrix.postgres }}
    if: github.event_name != 'pull_request'
    needs: [setup, docker_build, readme_test]
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.merge_matrix) }}

    runs-on: ubuntu-24.04

    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch images
        run: |
          # Reuse the branch tag and target repo computed by docker_build so a
          # workflow_dispatch with an explicit ref (e.g. v1.0.0) merges to the
          # right place, not the dispatched branch (main).
          BRANCH='${{ needs.docker_build.outputs.branch_tag }}'
          TARGET_REPO='${{ needs.docker_build.outputs.target_repo }}'

          SOURCES="ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-amd64-${{ github.sha }}"
          SOURCES+=" ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-arm64-${{ github.sha }}"
          SLIM_SOURCES="ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-slim-amd64-${{ github.sha }}"
          SLIM_SOURCES+=" ghcr.io/${{ github.repository }}/ci-builds:${{ matrix.postgres }}-slim-arm64-${{ github.sha }}"

          echo "Promoting full image to ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH}"
          docker buildx imagetools create \
            --tag ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH} \
            $SOURCES
          docker buildx imagetools inspect ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH}

          echo "Promoting slim image to ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH}-slim"
          docker buildx imagetools create \
            --tag ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH}-slim \
            $SLIM_SOURCES
          docker buildx imagetools inspect ${TARGET_REPO}:${{ matrix.postgres }}-${BRANCH}-slim

  # Run the e2e suite against the built image: the container runs on the host
  # network (so the pg_ducklake backend reaches the conftest-started MinIO on
  # host loopback), and the harness targets it via E2E_PG_* (external-cluster
  # mode) instead of building pg_ducklake from source.
  docker_e2e:
    name: e2e against docker image (PG 18)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, docker_build]
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: pgducklake
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Pull test image
        run: docker pull ghcr.io/${{ github.repository }}/ci-builds:18-amd64-${{ github.sha }}

      - name: Start pg_ducklake container (host network)
        run: |
          docker run -d --name pgducklake_e2e --network host \
            -e POSTGRES_PASSWORD=duckdb \
            ghcr.io/${{ github.repository }}/ci-builds:18-amd64-${{ github.sha }}
          for i in $(seq 60); do pg_isready -h 127.0.0.1 -p 5432 && break || sleep 1; done
          pg_isready -h 127.0.0.1 -p 5432

      - name: Run e2e against the container
        id: e2e
        timeout-minutes: 25
        env:
          E2E_PG_HOST: "127.0.0.1"
          E2E_PG_PORT: "5432"
          PGPASSWORD: "duckdb"
          # docker + network available, so the S3 tests must run, not skip.
          E2E_REQUIRE_S3: "1"
        run: uv run --project pg_ducklake/test/e2e -- pytest pg_ducklake/test/e2e -v

      - name: Container logs on failure
        if: failure()
        run: docker logs pgducklake_e2e || true

      - name: Cleanup
        if: always()
        run: docker rm -f pgducklake_e2e 2>/dev/null || true
