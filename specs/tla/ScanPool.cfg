\* Primary model: the fixed protocol. Producers may fail mid-task but report the
\* error (the PG_TRY in ProcessScanRange), and there is no external rescue
\* (AllowAbort = FALSE). The consumer must still always terminate, and pages must
\* never leak or double-free. Expect: all invariants hold and Termination holds.
CONSTANTS
    Producers = {p1, p2}
    NumPages = 2
    RingCap = 2
    ChunksPerTask = 2
    ReportErrors = TRUE
    AllowFail = TRUE
    AllowAbort = FALSE
SPECIFICATION Spec
INVARIANTS TypeOK PageConservation RingBounded
PROPERTIES Termination
