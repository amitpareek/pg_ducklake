\* Pre-fix bug: a failing producer dies silently (ReportErrors = FALSE) -- no
\* TaskDone, no SetError -- and there is no external rescue (AllowAbort = FALSE).
\* Safety still holds (the failed producer frees its own page), but Termination
\* FAILS: the consumer drains the ring and then polls forever because done < NP and
\* the error was never reported. This is the hang the PG_TRY fix prevents; TLC
\* reports a temporal-property violation with a counterexample trace.
CONSTANTS
    Producers = {p1, p2}
    NumPages = 2
    RingCap = 2
    ChunksPerTask = 2
    ReportErrors = FALSE
    AllowFail = TRUE
    AllowAbort = FALSE
SPECIFICATION Spec
INVARIANTS TypeOK PageConservation RingBounded
PROPERTIES Termination
