\* Teardown stress: the consumer may abort at any time (DuckDB cancel / LIMIT), and
\* producers may fail, while the scan is mid-flight. Exercises ScanRing::Close
\* reclaiming queued pages and producers releasing held pages on teardown. Expect:
\* PageConservation holds throughout (no leak, no double-free) and Termination holds
\* (every page returns to the free stack and the consumer reaches a terminal state).
CONSTANTS
    Producers = {p1, p2}
    NumPages = 2
    RingCap = 2
    ChunksPerTask = 2
    ReportErrors = TRUE
    AllowFail = TRUE
    AllowAbort = TRUE
SPECIFICATION Spec
INVARIANTS TypeOK PageConservation RingBounded
PROPERTIES Termination
